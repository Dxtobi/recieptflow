name: Build Android APK

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build web assets
        run: VITE_APP_ENV=mobile npm run build

      - name: Add and Sync Capacitor Android platform
        run: |
          # Backup custom icon files from git
          mkdir -p /tmp/android-icons
          if [ -d android/app/src/main/res/mipmap-hdpi ]; then
            cp -r android/app/src/main/res/mipmap-* /tmp/android-icons/
          fi
          rm -rf android
          npx cap add android
          # Restore custom icons
          if [ -d /tmp/android-icons/mipmap-hdpi ]; then
            cp -r /tmp/android-icons/* android/app/src/main/res/
          fi
          npx cap sync android

      - name: Build Android APK
        run: cd android && ./gradlew assembleDebug

      - name: Rename APK with version
        id: rename
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=v${VERSION}" >> $GITHUB_OUTPUT
          cp android/app/build/outputs/apk/debug/app-debug.apk "ReceiptFlow-v${VERSION}.apk"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ReceiptFlow-${{ steps.rename.outputs.version }}
          path: ReceiptFlow-*.apk
          if-no-files-found: error

      - name: Upload APK to Latest Release
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: Latest Build
          artifacts: ReceiptFlow-*.apk
          artifactContentType: application/vnd.android.package-archive
          allowUpdates: true
          replacesArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}
