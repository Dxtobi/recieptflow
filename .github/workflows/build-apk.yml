name: Build Android APK

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build web assets
        run: VITE_APP_ENV=mobile npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build Android APK
        run: cd android && ./gradlew assembleDebug

      - name: Copy APK to public/
        run: cp android/app/build/outputs/apk/debug/app-debug.apk public/receiptflow.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: receiptflow-apk
          path: public/receiptflow.apk
          if-no-files-found: error

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: public/receiptflow.apk
          generate_release_notes: true
